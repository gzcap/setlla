name: Deploy VuePress to GitHub Pages

# 根据你实际主分支修改：main / master 二选一
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: Checkout Source
        uses: actions/checkout@v4

      # 配置 Node.js（按你项目实际版本调整，16/18/20 都可）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # 安装依赖
      - name: Install Dependencies
        run: npm ci

      # VuePress 打包（输出到 .vuepress/dist，和你日志一致）
      - name: Build VuePress
        run: npm run build

      # 部署到 gh-pages 分支 —— 关键：必须写 token 字段
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.6.4
        with:
          branch: gh-pages
          folder: .vuepress/dist
          # 下面这行是救命配置，缺失必报错
          token: ${{ secrets.GITHUB_TOKEN }}
          delete: true
          clean: true